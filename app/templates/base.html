<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}배송 대시보드{% endblock %}</title>
    {% block head_extra %}{% endblock %}
    <link rel="stylesheet" href="/static/css/style.css?v=20260429-6">
    <script src="/static/js/main.js?v=20260429-6" defer></script>
</head>
<body>
<div class="page">
    <header class="page-header">
        <h1>{% block heading %}{% endblock %}</h1>
    </header>

    <div class="nav">
        <a href="/" class="{% if active_page == 'home' %}active{% endif %}">메인</a>
        <a href="/progress" class="{% if active_page == 'progress' %}active{% endif %}">진행중 전체</a>
        <a href="/completed" class="{% if active_page == 'completed' %}active{% endif %}">완료 전체</a>
        <a href="/cancelled" class="{% if active_page == 'cancelled' %}active{% endif %}">취소 목록</a>
    </div>

    {% if cache_key %}
    <div class="toolbar">
        <button type="button" class="refresh-button" data-cache-key="{{ cache_key }}">새로고침</button>
    </div>
    {% endif %}

    {% block content %}{% endblock %}
</div>

<div id="panel-backdrop" onclick="closePanel()"></div>
<div id="side-panel" aria-live="polite">
    <div class="panel-header">
        <h2>주문 상세</h2>
        <button type="button" class="panel-close" onclick="closePanel()">닫기</button>
    </div>
    <div id="detail-content"></div>
</div>
</body>
</html>
